trigger: none
pr: none

schedules:
- cron: '0 9 * * *' # 1am PST = 09:00 UTC.
  displayName: Daily npm Publish from GitHub Releases
  branches:
    include:
    - main

# The `resources` specify the location and version of the 1ES PT.
resources:
  repositories:
  - repository: fastPipelines
    type: git
    name: open-source/FASTPipelineTemplates
    ref: main
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  # The pipeline extends the 1ES PT which will inject different SDL and compliance tasks.
  # For non-production pipelines, use "Unofficial" as defined below.
  # For productions pipelines, use "Official".
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    # Update the pool with your team's 1ES hosted pool.
    pool:
      name: OneESPool  # Name of your hosted pool
      image: HostedPoolLinuxImage  # Name of the image in your pool. If not specified, first image of the pool is used
      os: linux  # OS of the image. This value cannot be a variable. Allowed values: windows, linux, macOS
    sdl:
      sourceAnalysisPool:
        name: OneESPool  # Name of your hosted pool
        image: HostedPoolWindowsImage  # Name of the image in your pool. If not specified, first image of the pool is used
        os: windows  # OS of the image. Allowed values: windows, linux, macOS
    settings:
      networkIsolationPolicy: Permissive
    stages:
    # Lightweight detection stage: lists GitHub releases and skips any that are
    # already on npm. If nothing remains to publish, the Publish stage is
    # skipped via the cross-stage `condition` on `hasReleases`.
    - stage: Detect
      displayName: Detect new GitHub releases
      jobs:
      - job: Check
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: "22.x"
            displayName: "Install Node.js"

          - script: |
              node build/scripts/download-github-releases.mjs
              if compgen -G "publish_artifacts/*.tgz" > /dev/null; then
                echo "Found $(ls publish_artifacts/*.tgz | wc -l) tarball(s) to publish."
                echo "##vso[task.setvariable variable=hasReleases;isOutput=true]true"
              else
                echo "No new releases to publish; downstream Publish stage will be skipped."
                echo "##vso[task.setvariable variable=hasReleases;isOutput=true]false"
              fi
            name: probe
            displayName: "Detect new GitHub releases that have not been published to npm"
            env:
              GH_TOKEN: $(GH_TOKEN)
              GITHUB_REPOSITORY: microsoft/fast

    - stage: Publish
      displayName: Publish tarballs to npm
      dependsOn: Detect
      condition: eq(dependencies.Detect.outputs['Check.probe.hasReleases'], 'true')
      jobs:
      - job: HostJob

        variables:
          npm_config_cache: $(Pipeline.Workspace)/.npm

        steps:
          - checkout: self
            persistCredentials: "true"

          - script: |
              git config --global user.email fastsvc@microsoft.com
              git config --global user.name "Microsoft FAST Builds"
              git remote set-url origin https://$(GH_TOKEN)@github.com/microsoft/fast.git

          - task: UseNode@1
            inputs:
              version: "22.x"
            displayName: "Install Node.js"

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: "Cache npm"

          - script: |
              npm ci
            displayName: "Install package dependencies"

          - script: |
              node build/scripts/download-github-releases.mjs
            displayName: "Download new GitHub release tarballs that have not been published to npm"
            env:
              GH_TOKEN: $(GH_TOKEN)
              GITHUB_REPOSITORY: microsoft/fast

          - template: FAST.Release.PipelineTemplate.yml@fastPipelines  # Template reference
