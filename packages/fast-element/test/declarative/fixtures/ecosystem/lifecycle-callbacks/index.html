<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>Lifecycle Callbacks Test</title>
    </head>
    <body>
        <simple-element needs-hydration
            ><template shadowrootmode="open" shadowroot="open"
                >Hello<!--fe:/b--> World</template
            ></simple-element
        >
        <complex-element needs-hydration count="0"
            ><template shadowrootmode="open" shadowroot="open"
                ><div>
                    <h2>Complex<!--fe:/b--></h2>
                    <p>Count: <!--fe:b-->0<!--fe:/b--></p>
                    <nested-element label="Complex" data-fe="1"
                        ><template shadowrootmode="open" shadowroot="open"
                            ><span>Complex<!--fe:/b--></span></template
                        ></nested-element
                    >
                </div></template
            ></complex-element
        >
        <deferred-element needs-hydration defer-hydration
            ><template shadowrootmode="open" shadowroot="open"
                ><p>Status: <!--fe:b-->pending<!--fe:/b--></p></template
            ></deferred-element
        >
        <deferred-parent-element needs-hydration defer-hydration
            ><template shadowrootmode="open" shadowroot="open"
                ><section>
                    <p>Parent<!--fe:/b--></p>
                    <deferred-child-element label="Parent" data-fe="1"
                        ><template shadowrootmode="open" shadowroot="open"
                            ><span>Parent<!--fe:/b--></span></template
                        ></deferred-child-element
                    >
                </section></template
            ></deferred-parent-element
        >
        <f-template name="simple-element">
            <template>{{ message }} World</template>
        </f-template>

        <f-template name="complex-element">
            <template>
                <div>
                    <h2>{{ title }}</h2>
                    <p>Count: {{ count }}</p>
                    <nested-element label="{{title}}"></nested-element>
                </div>
            </template>
        </f-template>

        <f-template name="nested-element">
            <template><span>{{ label }}</span></template>
        </f-template>

        <f-template name="deferred-element">
            <template><p>Status: {{ status }}</p></template>
        </f-template>

        <f-template name="deferred-parent-element">
            <template>
                <section>
                    <p>{{ label }}</p>
                    <deferred-child-element label="{{label}}"></deferred-child-element>
                </section>
            </template>
        </f-template>

        <f-template name="deferred-child-element">
            <template><span>{{ label }}</span></template>
        </f-template>

        <script type="module" src="./main.ts"></script>
    </body>
</html>
