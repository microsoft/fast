<f-template name="fast-card">
    <template>
        <link rel="stylesheet" href="./fast-card.css" />
        <dl>
            <dt>Configured Delay</dt>
            <dd>{{displayDelay}}</dd>
            <dt>Element Will Hydrate</dt>
            <dd>{{willHydrate}}</dd>
            <dt>Element Did Hydrate</dt>
            <dd>{{didHydrate}}</dd>
            <dt>Element Hydration Duration</dt>
            <dd>{{hydrationDuration}}</dd>
        </dl>
    </template>
</f-template>
