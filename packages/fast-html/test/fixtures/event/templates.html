<f-template name="test-element">
    <template>
        <button @click="{handleNoArgsClick()}">No arguments</button>
        <button @click="{handleEventArgClick(e)}">event argument (e, deprecated)</button>
        <button @click="{handleModifyAttributeClick()}">modify foo</button>
        <button @click="{handleDollarEArgClick($e)}">event argument ($e)</button>
        <button @click="{handleContextArgClick($c)}">context argument ($c)</button>
        <button @click="{handleMultiArgClick($e, $c)}">multiple arguments ($e, $c)</button>
        <button @click="{handleContextEventArgClick($c.event)}">context event argument ($c.event)</button>
    </template>
</f-template>
