<f-template name="test-element">
    <template>
        <ul>
            <f-repeat value="{{item in list}}">
                <li>{{item}} - {{item_parent}}</li>
            </f-repeat>
        </ul>
    </template>
</f-template>
<f-template name="test-element-inner-when">

            </f-repeat>
        </ul>
    </template>
</f-template>
