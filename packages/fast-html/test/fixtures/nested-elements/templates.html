<f-template name="child-element">
    <template>
        <div class="item">
            <span class="index">{{idx}}</span>
            <span class="text">{{text}}</span>
        </div>
    </template>
</f-template>
<f-template name="parent-element">
    <template>
        <div class="list-container">
            <h2>{{title}}</h2>
            <div class="items">
                <f-repeat value="{{item in items}}" positioning="true">
                    <child-element
                        text="{{item.text}}"
                        idx="{{$index}}"
                    ></child-element>
                </f-repeat>
            </div>
        </div>
    </template>
</f-template>

</f-template>
