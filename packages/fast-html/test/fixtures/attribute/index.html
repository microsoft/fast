<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <title></title>
        <script type="module" src="./main.ts"></script>
    </head>
    <body>
        <f-template name="test-element">
            <template><input type="{{type}}" disabled></template>
        </f-template>
        <test-element type="checkbox">
            <template shadowrootmode="open"><input disabled data-fe-b-0 type="checkbox"></template>
        </test-element>

        <f-template name="test-bool-condition">
            <template><div ?data-active="{{activeGroup == currentGroup}}" class="item">{{currentGroup}}</div></template>
        </f-template>
        <test-bool-condition id="bool-cond" active-group="work" current-group="work">
            <template shadowrootmode="open"><div data-active class="item" data-fe-b-0><!--fe-b$$start$$1$$currentGroup$$fe-b-->work<!--fe-b$$end$$1$$currentGroup$$fe-b--></div></template>
        </test-bool-condition>
    </body>
</html>
