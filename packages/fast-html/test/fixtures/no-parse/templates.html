<f-template name="code-display">
    <template>
        <h1 id="bound">{{greeting}}</h1>
        <pre id="sample"><code f-no-parse>span {{greeting}} /span</code></pre>
        <pre id="sample-directive"><code f-no-parse>&lt;f-when value="{{flag}}"&gt;wrapped&lt;/f-when&gt;</code></pre>
        <pre id="sample-client"><code f-no-parse>button @click="{handler()}" /button</code></pre>
        <p id="after">{{greeting}} world</p>
    </template>
</f-template>
