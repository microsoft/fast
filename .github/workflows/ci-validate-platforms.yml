name: Validate PRs On All Platforms/Browsers

on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review

  schedule:
    - cron: 0 7 * * 3

jobs:
  cross-platform_cross-browser:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      PLAYWRIGHT_BROWSERS_PATH: 0

    steps:
      - name: Set git to use LF
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache multiple paths
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install package dependencies
        run: npm ci

      - name: Biome CI check
        run: npm run biome:ci

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build workspaces
        run: npx lage build ${{ github.event_name == 'pull_request' && '--since origin/main' || '' }} --allow-no-target-runs --verbose

      - name: Install playwright dependencies and browsers
        run: |
          npx playwright install --with-deps

      - name: Run tests in all Packages
        run: npx lage test:node test:playwright ${{ github.event_name == 'pull_request' && '--since origin/main' || '' }} --allow-no-target-runs --verbose
