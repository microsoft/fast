name: Validate PRs on Chromium

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - releases/*
  pull_request:
    branches:
    - main
    - releases/*
    - features/*

jobs:
  test_js:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Cache multiple paths
      uses: actions/cache@v4
      env:
        cache-name: cache-node-modules
      with:
        path: ~/.npm
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - name: Install package dependencies
      run: npm ci

    - name: Check for the presence of changed files inside ./change
      run: npm run checkchange

    - name: Biome CI check
      run: npm run biome:ci

    - name: Install wasm-pack
      run: cargo install wasm-pack

    - name: Detect changed scope
      id: changed
      if: ${{ github.event_name == 'pull_request' }}
      run: |
        CRATE_CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- crates/ | head -1)
        if [ -n "$CRATE_CHANGED" ]; then
          echo "since=" >> "$GITHUB_OUTPUT"
        else
          echo "since=--since origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build workspaces
      run: lage build ${{ steps.changed.outputs.since }}

    - name: Install playwright dependencies and browsers
      run: |
        npx playwright install --with-deps

    - name: Testing unit tests
      run: lage test:node test:rules test:chromium ${{ steps.changed.outputs.since }}

    - name: Testing final validation
      run: npm run test:validation
