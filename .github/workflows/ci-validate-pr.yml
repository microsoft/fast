name: Validate PRs on Chromium

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - releases/*
  pull_request:
    branches:
    - main
    - releases/*
    - features/*

jobs:
  test_js:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Cache multiple paths
      uses: actions/cache@v4
      env:
        cache-name: cache-node-modules
      with:
        path: ~/.npm
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - name: Install Rust stable toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install package dependencies
      run: npm ci

    - name: Check for the presence of changed files inside ./change
      run: npm run checkchange

    - name: Check Biome formatting
      run: npm run format:check

    - name: Build workspaces
      run: npm run build

    - name: Install playwright dependencies and browsers
      run: |
        npx playwright install --with-deps

    - name: Testing unit tests
      run: npm run test:chromium

    - name: Testing final validation
      run: npm run test:validation
